<!DOCTYPE html>
<html>
<head>
<title>Farm to Table Agriculture Blockchain</title>

<script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>


<style>
body{font-family:Arial;background:#f4f4f4;text-align:center;}
h1{color:green;}
.box{background:white;width:400px;margin:20px auto;padding:20px;border-radius:10px;box-shadow:0 0 10px gray;}
input{width:90%;padding:10px;margin:8px;}
button{padding:10px;background:green;color:white;border:none;cursor:pointer;}
button:hover{background:darkgreen;}
table{margin:auto;border-collapse:collapse;width:80%;background:white;}
th,td{border:1px solid gray;padding:10px;}
th{background:green;color:white;}
</style>
</head>

<body>

<h1>🌾 Farm to Table Agriculture Blockchain</h1>

<button onclick="connectWallet()">🔗 Connect Wallet</button>

<p id="walletAddress"></p>

<div class="box">
<h3>Farmer Add Product</h3>
<input id="crop" placeholder="Crop Name">
<input id="price" placeholder="Price in ETH">
<button onclick="addProduct()">Add Product</button>
</div>

<div class="box">
<h3>Retailer Buy Product</h3>
<input id="productId" placeholder="Product ID">
<button onclick="buyProduct()">Buy Product</button>
</div>

<h2>Product List</h2>

<table id="productTable">
<tr>
<th>ID</th>
<th>Crop</th>
<th>Price (ETH)</th>
<th>Farmer</th>
<th>Owner</th>
</tr>
</table>

<script>

let web3;
let contract;
let account;

const contractAddress="0x456dBb6f9D837b54AB856D2C533D83Bcb3dC7a69";

const contractABI=[
    {
      "inputs": [],
      "name": "productCount",
      "outputs": [
        {
          "internalType": "uint256",
          "name": "",
          "type": "uint256"
        }
      ],
      "stateMutability": "view",
      "type": "function",
      "constant": true
    },
    {
      "inputs": [
        {
          "internalType": "uint256",
          "name": "",
          "type": "uint256"
        }
      ],
      "name": "products",
      "outputs": [
        {
          "internalType": "uint256",
          "name": "id",
          "type": "uint256"
        },
        {
          "internalType": "string",
          "name": "cropName",
          "type": "string"
        },
        {
          "internalType": "uint256",
          "name": "price",
          "type": "uint256"
        },
        {
          "internalType": "address payable",
          "name": "farmer",
          "type": "address"
        },
        {
          "internalType": "address",
          "name": "owner",
          "type": "address"
        }
      ],
      "stateMutability": "view",
      "type": "function",
      "constant": true
    },
    {
      "inputs": [
        {
          "internalType": "string",
          "name": "_cropName",
          "type": "string"
        },
        {
          "internalType": "uint256",
          "name": "_price",
          "type": "uint256"
        }
      ],
      "name": "addProduct",
      "outputs": [],
      "stateMutability": "nonpayable",
      "type": "function"
    },
    {
      "inputs": [
        {
          "internalType": "uint256",
          "name": "_id",
          "type": "uint256"
        }
      ],
      "name": "buyProduct",
      "outputs": [],
      "stateMutability": "payable",
      "type": "function",
      "payable": true
    }
  ];
async function connectWallet(){

if(window.ethereum){

web3=new Web3(window.ethereum);

await window.ethereum.request({ method:'eth_requestAccounts' });

const accounts=await web3.eth.getAccounts();

account=accounts[0];

document.getElementById("walletAddress").innerHTML="Connected Wallet: "+account;

contract=new web3.eth.Contract(contractABI,contractAddress);

loadProducts();

}else{

alert("Install MetaMask");

}

}

async function addProduct(){

const crop=document.getElementById("crop").value;

const price=web3.utils.toWei(
document.getElementById("price").value,
"ether"
);

await contract.methods.addProduct(crop,price).send({
from:account,
gas:3000000
});

alert("Product Added Successfully");

loadProducts();

}

async function buyProduct(){

const id=document.getElementById("productId").value;

const product=await contract.methods.products(id).call();

await contract.methods.buyProduct(id).send({
from:account,
value:product.price,
gas:3000000
});

alert("Transaction Successful");

loadProducts();

}

async function loadProducts(){

const count=await contract.methods.productCount().call();

const table=document.getElementById("productTable");

table.innerHTML=`<tr>
<th>ID</th>
<th>Crop</th>
<th>Price (ETH)</th>
<th>Farmer</th>
<th>Owner</th>
</tr>`;

for(let i=1;i<=count;i++){

const p=await contract.methods.products(i).call();

let row=table.insertRow();

row.insertCell(0).innerHTML=p.id;
row.insertCell(1).innerHTML=p.cropName;
row.insertCell(2).innerHTML=web3.utils.fromWei(p.price,"ether");
row.insertCell(3).innerHTML=p.farmer;
row.insertCell(4).innerHTML=p.owner;

}

}
window.ethereum.on('accountsChanged', function (accounts) {
    account = accounts[0];
    document.getElementById("walletAddress").innerHTML =
    "Connected Wallet: " + account;

    loadProducts();
});

</script>

</body>
</html>
